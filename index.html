<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Valdivieso AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0205; font-family: -apple-system, sans-serif; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      --poster-color: #0a0205;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px 20px;
    }
    #logo {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #logo::before {
      content: '';
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #C9A84C;
    }
    #ar-hint {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: all;
    }
    #ar-btn {
      background: #C9A84C;
      color: #0a0205;
      border: none;
      border-radius: 4px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
    }
    #ar-hint p {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    #disclaimer {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      line-height: 1.6;
    }
    .hotspot-label {
      background: rgba(10,2,5,0.88);
      border: 0.5px solid rgba(201,168,76,0.5);
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
    }
    .hotspot-label strong {
      color: #C9A84C;
      display: block;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="botella1.glb"
    ios-src="botella2.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    scale="0.01 0.01 0.01"
    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.1"
  >
    <button slot="ar-button" id="ar-btn">
      Ver en tu espacio
    </button>
    <div class="hotspot-label" slot="hotspot-1"
      data-position="0 0.012 0.001"
      data-normal="0 0 1">
      <strong>Valle de Curicó</strong>
      Cabernet Sauvignon · 2022
    </div>
  </model-viewer>
  <div id="overlay">
    <div id="logo">VinoRumbo</div>
    <div id="ar-hint">
      <p>Rota · Acerca · Explora</p>
    </div>
    <div id="disclaimer">
      El consumo de alcohol es perjudicial para la salud.<br>
      Prohibida su venta a menores de 18 años. Beba con moderación.
    </div>
  </div>
  <script type="module">
    const viewer = document.querySelector('#viewer');
    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status === 'session-started') {
        document.getElementById('overlay').style.display = 'none';
      } else {
        document.getElementById('overlay').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
